name: Deploy docs

on:
  push:
    branches:
      - main

# Keyless GitHub Pages deploy: uses the built-in GITHUB_TOKEN (via id-token),
# no Personal Access Token. Requires the repo's Pages source to be set to
# "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let a new push supersede an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Doxygen documentation
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
          cd docs
          doxygen

      # Best-effort: a browser-playable WASM build of the emulator console.
      # If the emscripten build breaks, don't block the docs deploy.
      - name: Build WASM console
        continue-on-error: true
        uses: addnab/docker-run-action@v3
        with:
          image: emscripten/emsdk
          options: -v ${{ github.workspace }}:/src
          run: |
            make -C console/wasm
            mkdir -p docs/html/emu/
            cp console/wasm/console.html docs/html/emu/index.html
            cp console/wasm/main.mjs docs/html/emu
            cp console/wasm/main.wasm docs/html/emu

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
